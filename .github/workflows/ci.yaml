name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "eval/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: ">=0.11"
      - name: Install dev dependencies
        run: uv sync --extra dev --extra-index-url https://download.pytorch.org/whl/cpu --index-strategy unsafe-best-match
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: ">=0.11"
      - name: Install dev dependencies
        run: uv sync --extra dev --extra-index-url https://download.pytorch.org/whl/cpu --index-strategy unsafe-best-match
      - name: Mypy (eval)
        run: uv run mypy src/ragbench/eval/
      - name: Mypy (serving)
        run: uv run mypy src/ragbench/serving/

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: ">=0.11"
      - name: Install dev dependencies
        run: uv sync --extra dev --extra-index-url https://download.pytorch.org/whl/cpu --index-strategy unsafe-best-match
      - name: Run unit tests with coverage
        # Integration tests (qdrant, GPU) are excluded from CI — run them locally
        run: uv run pytest tests/unit/ -m "not integration" --cov=src/ragbench/eval --cov-report=term-missing --cov-fail-under=80
      # eval/ coverage threshold rises to 95 in Phase 3 when stats.py is complete
